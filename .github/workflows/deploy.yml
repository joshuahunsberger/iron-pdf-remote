name: Aspire Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure Container Apps
    environment:
      name: production
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check role-assignment permissions
        id: rbac
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          ASSIGNMENT_COUNT=$(az role assignment list \
            --assignee "$AZURE_CLIENT_ID" \
            --all \
            --include-inherited \
            --query "[?roleDefinitionName=='Owner' || roleDefinitionName=='User Access Administrator' || roleDefinitionName=='Role Based Access Control Administrator'] | length(@)" \
            -o tsv)
          if [ "${ASSIGNMENT_COUNT:-0}" -gt 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with Aspire
        if: steps.rbac.outputs.can_deploy == 'true'
        run: aspire deploy --apphost ./IronPdfRemoteDemo.AppHost/IronPdfRemoteDemo.AppHost.csproj --environment Production --non-interactive
        env:
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION || 'eastus2' }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          Parameters__IronPdfLicenseKey: ${{ secrets.IRON_PDF_LICENSE_KEY }}

      - name: Skip deploy when role-assignment permissions are missing
        if: steps.rbac.outputs.can_deploy != 'true'
        run: |
          echo "::warning::Skipping deploy because the Azure identity lacks role-assignment permissions (Microsoft.Authorization/roleAssignments/write)."
          echo "Run requires Owner, User Access Administrator, or Role Based Access Control Administrator at subscription/resource-group scope."
          aspire deploy --apphost ./IronPdfRemoteDemo.AppHost/IronPdfRemoteDemo.AppHost.csproj --environment Production --non-interactive --list-steps
