name: Aspire Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    name: Destroy Azure Container Apps Deployment
    environment:
      name: production
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Cache Aspire deployment state
        uses: actions/cache@v4
        with:
          path: ~/.aspire/deployments
          key: aspire-deploy-${{ hashFiles('**/IronPdfRemoteDemo.AppHost.csproj') }}-${{ github.run_id }}
          restore-keys: |
            aspire-deploy-${{ hashFiles('**/IronPdfRemoteDemo.AppHost.csproj') }}-
            aspire-deploy-

      - name: Destroy with Aspire
        run: aspire destroy --apphost ./IronPdfRemoteDemo.AppHost/IronPdfRemoteDemo.AppHost.csproj --environment Production --yes --non-interactive
        env:
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION || 'eastus2' }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          Parameters__IronPdfLicenseKey: ${{ secrets.IRON_PDF_LICENSE_KEY }}

      - name: Delete Azure Resource Group if remaining
        if: always()
        run: |
          if az group show --name "${{ vars.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then
            echo "Resource group still exists. Deleting..."
            az group delete --name "${{ vars.AZURE_RESOURCE_GROUP }}" --yes
          else
            echo "Resource group already removed."
          fi
